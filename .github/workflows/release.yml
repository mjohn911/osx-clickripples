name: Build Release App

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-macos-app:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app
        run: ./build.sh

      - name: Package app zip
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/ClickRipples.app dist/ClickRipples.app.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClickRipples.app
          path: dist/ClickRipples.app.zip

      - name: Attach zip to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ClickRipples.app.zip
